global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: staging
    environment: staging

scrape_configs:
  # Self-scrape
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # Loki metrics
  - job_name: loki
    static_configs:
      - targets: ['loki.observability.local:3100']
    metrics_path: /metrics

  # Tempo metrics
  - job_name: tempo
    static_configs:
      - targets: ['tempo.observability.local:3200']
    metrics_path: /metrics

  # Grafana metrics
  - job_name: grafana
    static_configs:
      - targets: ['grafana.observability.local:3000']
    metrics_path: /metrics

  # Thanos-sidecar (runs inside the prometheus task on localhost)
  - job_name: thanos-sidecar
    static_configs:
      - targets: ['localhost:10902']
    metrics_path: /metrics

  # Thanos-query
  - job_name: thanos-query
    static_configs:
      - targets: ['thanos-query.observability.local:10902']
    metrics_path: /metrics
